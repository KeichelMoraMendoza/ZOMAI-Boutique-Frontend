<div class="container py-5">
  <div class="card shadow-lg border-0 rounded-4">
    <div class="card-header bg-white border-0 pt-4 px-4">
      <h3 class="fw-bold">{{ esEdicion ? 'Editar Socio' : 'Nuevo Socio Comercial' }} - ZOMAI</h3>
      <p class="text-muted">Gestione la información de contacto y ubicación de sus proveedores.</p>
    </div>

    <div class="card-body px-4">
      <form [formGroup]="proveedorForm" (ngSubmit)="guardar()">
        <div class="row g-3">
          
          <div class="col-md-12">
            <label class="form-label fw-bold">Nombre de la Empresa / Proveedor</label>
            <input type="text" formControlName="NOMBREPROVEEDOR" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label fw-bold">Teléfono de Contacto</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-phone"></i></span>
              <input type="text" formControlName="TELEFONO" class="form-control">
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-bold">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" formControlName="EMAIL" class="form-control">
            </div>
          </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-5 mb-3">
          <button type="button" (click)="cancelar()" class="btn btn-light px-4 border">
            Cancelar
          </button>
          <button type="submit" [disabled]="proveedorForm.invalid" class="btn btn-primary px-5">
            <i class="fas fa-save me-2"></i>
            {{ esEdicion ? 'Actualizar Proveedor' : 'Registrar Proveedor' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
