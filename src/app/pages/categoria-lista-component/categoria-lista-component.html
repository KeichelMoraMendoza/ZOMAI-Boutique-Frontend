<div class="container-fluid py-4">
  <div class="card shadow-sm border-0 rounded-4">
    
    <div class="card-header bg-white border-0 pt-4 pb-3 px-4">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
          <h2 class="mb-1 fw-bold text-dark">Categorías de Moda - ZOMAI</h2>
          <p class="text-muted mb-0">
            Administre las familias y secciones de productos de la boutique.
          </p>
        </div>

        <button (click)="nuevaCategoria()" class="btn btn-primary px-4 py-2 rounded-3">
          <i class="fas fa-plus me-2"></i>
          Nueva Categoría
        </button>
      </div>
    </div>

    <div class="card-body px-4 pt-3 pb-2">
      <div class="row g-3 align-items-end">
        <div class="col-md-10">
          <label for="txtBuscar" class="form-label fw-semibold">Filtrar Categorías</label>
          <input
            type="text"
            id="txtBuscar"
            class="form-control rounded-3"
            placeholder="Buscar por nombre o descripción de la categoría..."
          />
        </div>

        <div class="col-md-2 d-grid">
          <button class="btn btn-outline-primary rounded-3">
            <i class="fas fa-search me-2"></i>
            Buscar
          </button>
        </div>
      </div>
    </div>

    <div class="card-body px-4 pb-4">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 100px;">ID</th>
              <th>Nombre de Categoría</th>
              <th>Descripción / Estilo</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
              <tr *ngFor="let cat of categorias">
                <td class="fw-bold">#{{ cat.ID_CATEGORIA }}</td>
                <td class="fw-semibold text-primary">{{ cat.NOMBRECATEGORIA }}</td>
                <td class="text-muted">{{ cat.DESCRIPCION }}</td>
                
                <td class="text-center">
                  <button (click)="editarCategoria(cat.ID_CATEGORIA)" class="btn btn-sm btn-outline-warning me-2">
                   <i class="fas fa-edit"></i>
                  </button>
                  <button (click)="eliminarCategoria(cat.ID_CATEGORIA)" class="btn btn-sm btn-outline-danger">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                </td>
              </tr>

            <tr *ngIf="categorias.length === 0">
              <td colspan="4" class="text-center text-muted py-5">
                <i class="fas fa-folder-open d-block mb-2 fs-2"></i>
                No se encontraron categorías registradas en ZOMAI.
              </td>
            </tr>

          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
