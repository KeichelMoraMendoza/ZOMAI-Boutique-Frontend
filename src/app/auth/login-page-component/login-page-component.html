<section id="wrapper" class="login-register login-sidebar" style="background-image:url(../../images/background/login-register.jpg);">
    <div class="login-box card">
        <div class="card-body">
            <form [formGroup]="loginForm" class="form-horizontal form-material" id="loginform">
                <div class="text-center m-b-40">
                    <h2 class="brand-name" style="letter-spacing: 5px; margin-bottom: 0;">ZOMAI</h2>
                    <small style="text-transform: uppercase; letter-spacing: 2px; color: #9D844D;">Boutique</small>
                </div>

                <div class="form-group m-t-40">
                    <div class="col-xs-12">
                        <input formControlName="usuario" class="form-control" type="text" required="" placeholder="Usuario">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="col-xs-12">
                        <input formControlName="clave" class="form-control" type="password" required="" placeholder="Contraseña">
                    </div>
                </div>

                <div class="form-group row">
                    <div class="col-md-12">
                        <div class="checkbox checkbox-primary pull-left p-t-0">
                            <input id="checkbox-signup" type="checkbox" class="filled-in chk-col-grey">
                            <label for="checkbox-signup" style="font-size: 0.8rem;"> Recordarme </label>
                        </div>
                        <a href="javascript:void(0)" id="to-recover" class="text-muted pull-right" style="font-size: 0.8rem;">
                            <i class="fa fa-lock m-r-5"></i> ¿Olvidaste tu contraseña?
                        </a> 
                    </div>
                </div>

                <div class="form-group text-center m-t-20">
                    <div class="col-xs-12">
                        <button (click)="login()" class="btn btn-primary btn-lg btn-block text-uppercase" type="submit">
                            Iniciar Sesión
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 m-t-10 text-center">
                        <div class="social">
                            <a href="javascript:void(0)" class="btn btn-facebook" data-toggle="tooltip" title="Login with Facebook"> <i aria-hidden="true" class="fa fa-facebook"></i> </a> 
                            <a href="javascript:void(0)" class="btn btn-googleplus" data-toggle="tooltip" title="Login with Google"> <i aria-hidden="true" class="fa fa-google-plus"></i> </a> 
                        </div>
                    </div>
                </div>

                <div class="form-group m-b-0">
                    <div class="col-sm-12 text-center" style="font-size: 0.85rem;">
                        ¿No tienes una cuenta? <a href="javascript:void(0)" class="text-gold m-l-5"><b>Regístrate</b></a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
